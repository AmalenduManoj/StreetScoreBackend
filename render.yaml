# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → connect this repo, or create Web Service manually (same settings).

services:
  - type: web
    name: cricscore-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /teams/get
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_RESET_PASSWORD_URL
        sync: false
      - key: RUST_LOG
        value: info
      - key: HOST
        value: 0.0.0.0
